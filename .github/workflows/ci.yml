name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: unit tests + user-scenario acceptance tests ───────────────────
  backend:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit + integration tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: ci-secret-key
          LLM_PROVIDER: openai
          OPENAI_API_KEY: sk-test-ci
        run: pytest tests/test_core.py -v --tb=short

      - name: Run user-scenario acceptance tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_acceptance.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: ci-secret-key
          LLM_PROVIDER: openai
          OPENAI_API_KEY: sk-test-ci
        run: pytest tests/acceptance/ -v --tb=short

      - name: Run model quality eval tests
        run: pytest tests/eval/ -v --tb=short

  # ─── Frontend: type check + vitest user-scenario tests ──────────────────────
  frontend:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run user-scenario tests (vitest)
        run: npm run test:run

      - name: Build
        run: npm run build
