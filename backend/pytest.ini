[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default: exclude real_llm tests (they call real APIs, CI-incompatible)
addopts = -m "not real_llm" --tb=short

markers =
    real_llm: tests that call a real LLM via API — run locally with: pytest -m real_llm
    acceptance: user-facing acceptance tests (tests/acceptance/)
    eval: model quality evaluation tests (tests/eval/)
